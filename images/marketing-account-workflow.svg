<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1580 210" width="1580" height="210">
    <defs>
          <style>
                  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
                  .step-label { font-family: 'Inter', Arial, sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; fill: #737373; }
                  .step-title { font-family: 'Inter', Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #242423; }
                  .tools-label { font-family: 'Inter', Arial, sans-serif; font-size: 11px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.05em; fill: #737373; }
                  .tools-value { font-family: 'Inter', Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #4A4A4A; }
          </style>
    </defs>

    <!-- Background -->
    <rect width="1580" height="210" rx="16" fill="#F1F0ED"/>

    <!-- Step 1 -->
    <rect x="20" y="10" width="220" height="190" rx="16" fill="white" stroke="#E5E5E5" stroke-width="1"/>
    <text x="40" y="42" class="step-label">Step 1</text>
    <text x="40" y="68" class="step-title">Gather Submission</text>
    <text x="40" y="158" class="tools-label">Tools</text>
    <text x="40" y="180" class="tools-value">Coverage Table</text>

    <!-- Arrow 1 -->
    <g transform="translate(256, 95)">
          <line x1="0" y1="10" x2="24" y2="10" stroke="#F43F5E" stroke-width="2" stroke-linecap="round"/>
          <polyline points="17,3 24,10 17,17" fill="none" stroke="#F43F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 2 -->
    <rect x="280" y="10" width="220" height="190" rx="16" fill="white" stroke="#E5E5E5" stroke-width="1"/>
    <text x="300" y="42" class="step-label">Step 2</text>
    <text x="300" y="68" class="step-title">Risk &amp; Strategy</text>
    <text x="300" y="158" class="tools-label">Tools</text>
    <text x="300" y="180" class="tools-value">Policy Analysis</text>

    <!-- Arrow 2 -->
    <g transform="translate(516, 95)">
          <line x1="0" y1="10" x2="24" y2="10" stroke="#F43F5E" stroke-width="2" stroke-linecap="round"/>
          <polyline points="17,3 24,10 17,17" fill="none" stroke="#F43F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 3 -->
    <rect x="540" y="10" width="220" height="190" rx="16" fill="white" stroke="#E5E5E5" stroke-width="1"/>
    <text x="560" y="42" class="step-label">Step 3</text>
    <text x="560" y="68" class="step-title">Build Submission</text>
    <text x="560" y="158" class="tools-label">Tools</text>
    <text x="560" y="180" class="tools-value">Chats</text>

    <!-- Arrow 3 -->
    <g transform="translate(776, 95)">
          <line x1="0" y1="10" x2="24" y2="10" stroke="#F43F5E" stroke-width="2" stroke-linecap="round"/>
          <polyline points="17,3 24,10 17,17" fill="none" stroke="#F43F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 4 -->
    <rect x="800" y="10" width="220" height="190" rx="16" fill="white" stroke="#E5E5E5" stroke-width="1"/>
    <text x="820" y="42" class="step-label">Step 4</text>
    <text x="820" y="68" class="step-title">Select Markets</text>
    <text x="820" y="158" class="tools-label">Tools</text>
    <text x="820" y="180" class="tools-value">Batch Extraction</text>

    <!-- Arrow 4 -->
    <g transform="translate(1036, 95)">
          <line x1="0" y1="10" x2="24" y2="10" stroke="#F43F5E" stroke-width="2" stroke-linecap="round"/>
          <polyline points="17,3 24,10 17,17" fill="none" stroke="#F43F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 5 -->
    <rect x="1060" y="10" width="220" height="190" rx="16" fill="white" stroke="#E5E5E5" stroke-width="1"/>
    <text x="1080" y="42" class="step-label">Step 5</text>
    <text x="1080" y="68" class="step-title">Submit to Carriers</text>
    <text x="1080" y="158" class="tools-label">Tools</text>
    <text x="1080" y="180" class="tools-value">Browser Extension</text>

    <!-- Arrow 5 -->
    <g transform="translate(1296, 95)">
          <line x1="0" y1="10" x2="24" y2="10" stroke="#F43F5E" stroke-width="2" stroke-linecap="round"/>
          <polyline points="17,3 24,10 17,17" fill="none" stroke="#F43F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Step 6 -->
    <rect x="1320" y="10" width="240" height="190" rx="16" fill="white" stroke="#E5E5E5" stroke-width="1"/>
    <text x="1340" y="42" class="step-label">Step 6</text>
    <text x="1340" y="68" class="step-title">Compare &amp; Negotiate</text>
    <text x="1340" y="158" class="tools-label">Tools</text>
    <text x="1340" y="180" class="tools-value">Compare Documents</text>
</svg>
